# =============================================================================
# GPLv3 Removal Baseline — distro.conf snippet
# For integration into a custom Yocto distro configuration
# =============================================================================

# If you maintain a custom distro (meta-mycompany/conf/distro/mycompany.conf),
# add these settings there instead of local.conf for team-wide enforcement.

# Block GPL-3.0 on target
INCOMPATIBLE_LICENSE:class-target = "GPL-3.0* LGPL-3.0* AGPL-3.0*"

# Standard exceptions (GCC runtime + dual-license elections)
INCOMPATIBLE_LICENSE_EXCEPTIONS = " \
    libgcc:GPL-3.0-with-GCC-exception \
    libstdc++:GPL-3.0-with-GCC-exception \
    gmp:LGPL-3.0-or-later \
    libidn2:LGPL-3.0-only \
    libunistring:LGPL-3.0-or-later \
    nettle:LGPL-3.0-or-later \
"

# Prefer BusyBox
VIRTUAL-RUNTIME_base-utils = "busybox"
VIRTUAL-RUNTIME_login_manager = "busybox"

# Remove non-essential GPLv3 packages
BAD_RECOMMENDATIONS += "mc screen"
